# ==========================================
# DWG 转 PNG 配置参数
# ==========================================

# --- 基础设置 ---

input_path=D:\\123\\input
output_path=E:\\123\\output

# input_path=D:\\123\\input\\(S23-315)20230728新昌县工业区发展有限公司（梅渚花海安置小区）供水安装工程 -调整.dwg
# output_path=E:\\123\\output\\(S23-315)20230728新昌县工业区发展有限公司（梅渚花海安置小区）供水安装工程 -调整.png

# input_path=D:\\123\\input\\20220712(S22-155)新品冠置业印象江南花园一期二期供水安装工程-二期.dwg
# output_path=E:\\123\\output\\20220712(S22-155)新品冠置业印象江南花园一期二期供水安装工程-二期.png

# input_path=D:\\123\\input\\S24-040（20240305）新昌合美置业有限公司（文德华府）供水安装工程.dwg
# output_path=E:\\123\\output\\S24-040（20240305）新昌合美置业有限公司（文德华府）供水安装工程.png

# 输出图片分辨率 (像素)
width=30000
height=30000

# 最大分辨率限制 (像素)
max_resolution_limit=400000000

# --- 密集区域提取算法参数 ---
# 最大提取区域数量
max_regions=9

# 密度阈值百分位 (0.0 - 1.0)，越高越严格
region_percentile=0.95

# 最小单元格填充率 (0.0 - 1.0)
min_cell_fill=0.00001

# 最小区域像素数 (基于原图尺寸)
min_region_pixels=500000

# 区域合并时的边距 (单元格数)
margin_cells=1

# 背景色判定容差 (0-255)
bg_delta=25

# 网格划分目标横向单元格数
grid_target_cells_across=128

# 区域分数筛选阈值比例 (0.0 - 1.0)，相对于最大区域分数的比例。
# 越低越容易保留较淡或较小的区域。默认0.3 (30%)。
# 建议设为 0.05 或 0.1 以保留更多内容。 
score_threshold_ratio=0.1

# 最小区域像素密度 (ink/area)，用于过滤大而空的区域（如边框）。
# 建议设为 0.005 或 0.01。
min_region_density=0.05

# 最小网格填充率 (ActiveCells / RectCells)，用于过滤空心圆圈等
# 圆圈通常低于 0.05，有效图通常高于 0.2
min_region_fill_ratio=0.25

# --- 区域二次渲染（像素区域映射到DWG视窗后重渲染） ---
# 是否启用：启用后将输出 *_region_N.png 并将区域渲染结果拼接为最终输出PNG
rerender_regions=false

# 区域二次渲染的分辨率倍率（相对检测到的像素区域宽高）
region_rerender_scale=2.0

# 单个区域二次渲染的最大边长（像素），超过会等比缩小
region_rerender_max_dimension=15000

# 单个区域二次渲染的最大总像素（w*h），超过会按比例缩小以避免OOM
rerender_max_pixels=270000000

# 二次渲染时对检测框做额外扩展的比例（相对 max(w,h)），用于包含少量上下文
region_margin_ratio=0.02

# 拼接输出：区域间间隙（像素，拼接时会随整体缩放同比例缩放）
stitch_gap=100

# 拼接输出：最大边长（像素），超过会整体等比缩小，避免超大合成图占用内存
merged_max_dimension=82000

# 是否保留 *_region_N.png 文件；false 时仅保留最终拼接图
keep_region_images=false

# 是否保留全图临时文件（*.temp.png）；默认 false 会在成功后清理
keep_full_image=false

# --- 白框读取与二次渲染（在映射结果附近查找封闭白框，通常3个） ---
# 启用后：在最大密集区域附近检测封闭白框，按白框二次渲染并拼接；检测失败会回退到原区域二次渲染
rerender_white_frames=true

# 白框检测：在锚点区域的基础上额外向外扩展的比例（相对 max(w,h)）
white_frame_search_expand_ratio=0.5

# 白框检测：近灰白像素判定阈值（RGB 0-255，越大越“白”）
white_frame_gray_threshold=160

# 白框检测：RGB 三通道差值容忍（越小越接近灰白）
white_frame_channel_delta=40

# 白框检测：最小白框边长（像素，基于原图）
white_frame_min_box_dim=20

# 白框检测：四条边的最小覆盖率（0-1，越大越严格）
white_frame_min_side_coverage=0.1

# 白框检测：内部区域允许的最大“白像素覆盖率”（用于过滤实心白块/大面积白底）
white_frame_max_inner_coverage=0.06

# 白框检测：输出矩形额外扩展像素（包含边框外少量留白）
white_frame_margin_px=20

# 白框检测：最多取几个白框（一般为3）
white_frame_max_frames=3

# 白框检测：输出调试日志（打印锚点、搜索范围、白框坐标）
white_frame_debug_log=true

# --- DWG 外框识别（优先在DWG里找外框再渲染，而不是依赖PNG白框像素） ---
# 外框搜索：在映射到DWG的锚点窗口基础上向外扩展比例（相对宽高）
dwg_frame_search_expand_ratio=1.0

# 外框渲染：对外框世界坐标范围额外扩边比例（相对宽高）
dwg_frame_margin_ratio=0.02

# 外框二次渲染倍率（仅作用于DWG外框渲染；默认跟随 region_rerender_scale）
dwg_frame_rerender_scale=8.0

# 外框过滤：最小外框面积比例（相对锚点窗口面积）
dwg_frame_min_area_ratio=0.01

# 外框识别：输出调试日志（打印搜索范围与外框坐标）
dwg_frame_debug_log=true

# 若为 true：只走 DWG 外框识别，不再回退 PNG 白框像素检测
dwg_frame_only=true
